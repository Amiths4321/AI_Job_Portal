{% extends "base.html" %}
{% block title %}Apply - Step 1{% endblock %}
{% block content %}

<div class="stepper">
    <span class="step active">1. Personal</span>
    <span class="step">2. Education & Experience</span>
    <span class="step">3. Resume</span>
    <span class="step">4. Review</span>
</div>

<h2>Applying for: {{ job.title }}</h2>
<form method="POST" class="form-card">
    <label>Full Name</label>
    <input type="text" name="full_name" value="{{ data.full_name or '' }}" required>

    <label>Email</label>
    <input type="email" name="email" value="{{ data.email or '' }}" required>

    <label>Phone Number</label>
    <input type="tel" name="phone" pattern="[0-9]{10}" value="{{ data.phone or '' }}" required>

    <label>Date of Birth</label>
    <input type="date" name="dob" value="{{ data.dob or '' }}" required>

    <label>Address</label>
    <textarea name="address" rows="3" required>{{ data.address or '' }}</textarea>

    <div class="form-actions">
        <a class="btn btn-secondary" href="{{ url_for('job_detail', job_id=job.id) }}">&larr; Back to job</a>
        <button type="submit" class="btn btn-primary">Next: Education & Experience &rarr;</button>
    </div>
</form>
{% endblock %}
